<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Overseas-Chinese Growth Campaign</title>
<style>
:root{--ink:#141414;--ink2:#565656;--ink3:#8a8a8a;--line:#e7e7e7;--line2:#f1f1f1;--bg:#fff;--track:#ededed;}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;line-height:1.62;font-size:16px;}
body.locked{overflow:hidden;}
a{color:inherit;}
/* gate */
#gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:50;}
#gate-card{width:300px;text-align:center;padding:8px;}
#gate-card h2{font-size:15px;font-weight:600;letter-spacing:.02em;color:var(--ink2);margin:0 0 18px;}
#gate-form{display:flex;gap:8px;}
#gate-input{flex:1;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;outline:none;}
#gate-input:focus{border-color:var(--ink2);}
#gate-btn{padding:10px 16px;border:1px solid var(--ink);background:var(--ink);color:#fff;border-radius:8px;font-size:14px;cursor:pointer;}
#gate-err{height:16px;margin-top:10px;font-size:12px;color:#b00;}
/* layout */
.doc{display:flex;max-width:1140px;margin:0 auto;}
.sidebar{width:262px;flex:none;position:sticky;top:0;align-self:flex-start;height:100vh;padding:54px 30px 30px;border-right:1px solid var(--line);display:flex;flex-direction:column;}
.brand{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);}
.brand-sub{font-size:14px;font-weight:600;margin-top:6px;color:var(--ink);line-height:1.35;}
.sidebar nav{margin-top:30px;display:flex;flex-direction:column;gap:2px;}
.sidebar nav a{font-size:13px;color:var(--ink3);text-decoration:none;padding:6px 0;border:0;transition:color .15s;}
.sidebar nav a:hover{color:var(--ink2);}
.sidebar nav a.active{color:var(--ink);font-weight:600;}
.side-foot{margin-top:auto;font-size:11px;color:var(--ink3);line-height:1.7;padding-top:24px;}
.side-foot a{color:var(--ink3);}
.main{flex:1;min-width:0;padding:60px 60px 100px;max-width:780px;}
.eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:14px;}
h1{font-size:34px;line-height:1.15;letter-spacing:-.02em;margin:0 0 18px;font-weight:680;}
.lede{font-size:18px;line-height:1.55;color:var(--ink2);margin:0 0 28px;}
.metarow{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:8px;}
.metarow>div{background:var(--bg);padding:14px 16px;font-size:14px;}
.metarow span{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px;}
section{padding:46px 0 0;scroll-margin-top:24px;border-top:1px solid var(--line2);margin-top:46px;}
section:first-of-type{border-top:0;margin-top:34px;}
h2{font-size:22px;letter-spacing:-.01em;margin:0 0 16px;font-weight:660;display:flex;align-items:baseline;gap:12px;}
h2 .num{font-size:12px;font-weight:600;color:var(--ink3);font-variant-numeric:tabular-nums;letter-spacing:.05em;}
h3{font-size:14px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin:30px 0 12px;font-weight:600;}
p{margin:0 0 14px;color:var(--ink);}
p.muted,.muted{color:var(--ink2);font-size:14.5px;}
ul,ol{margin:0 0 14px;padding-left:20px;}
li{margin-bottom:8px;}
ol.angles{counter-reset:a;list-style:none;padding-left:0;}
ol.angles li{position:relative;padding-left:34px;margin-bottom:12px;}
ol.angles li:before{counter-increment:a;content:counter(a);position:absolute;left:0;top:0;width:22px;height:22px;border:1px solid var(--line);border-radius:50%;font-size:12px;display:flex;align-items:center;justify-content:center;color:var(--ink2);font-variant-numeric:tabular-nums;}
.ladder{font-size:16px;}
.ladder b{font-weight:640;}
/* tables */
table{width:100%;border-collapse:collapse;margin:6px 0 12px;font-size:14.5px;}
th,td{text-align:left;padding:10px 10px;border-bottom:1px solid var(--line);}
th{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);font-weight:600;}
td.r,th.r{text-align:right;font-variant-numeric:tabular-nums;}
tr.total td{border-top:1.5px solid var(--ink);border-bottom:0;font-weight:660;}
.tag{font-size:10px;letter-spacing:.08em;text-transform:uppercase;border:1px solid var(--line);border-radius:20px;padding:1px 7px;color:var(--ink2);margin-left:6px;vertical-align:middle;}
/* funnel */
.funnel{display:flex;flex-direction:column;gap:0;margin:18px 0 16px;}
.fstep{padding:16px 0;border-bottom:1px solid var(--line2);}
.fstep:last-child{border-bottom:0;}
.fnum{font-size:26px;font-weight:660;letter-spacing:-.01em;font-variant-numeric:tabular-nums;}
.flab{font-size:13px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink2);margin-top:2px;}
.fsub{font-size:13.5px;color:var(--ink3);margin-top:3px;}
/* bars */
.bars{margin:14px 0 8px;display:flex;flex-direction:column;gap:12px;}
.barrow{display:grid;grid-template-columns:64px 1fr 116px;align-items:center;gap:14px;font-size:13.5px;}
.barlab{color:var(--ink2);}
.bar-track{height:8px;background:var(--track);border-radius:6px;overflow:hidden;}
.bar-fill{height:100%;background:var(--ink);border-radius:6px;}
.barval{text-align:right;color:var(--ink2);font-variant-numeric:tabular-nums;}
/* goal */
.goal{border:1px solid var(--line);border-radius:12px;padding:22px 24px;margin:18px 0;display:flex;gap:22px;align-items:center;}
.goal-k{font-size:46px;font-weight:700;letter-spacing:-.02em;line-height:1;font-variant-numeric:tabular-nums;}
.goal-t{font-size:15.5px;color:var(--ink2);line-height:1.5;}
.foot-note{font-size:13px;color:var(--ink3);}
.end{margin-top:40px;padding-top:20px;border-top:1px solid var(--line);font-size:12px;color:var(--ink3);}
.end a{color:var(--ink3);}
@media(max-width:880px){
 .doc{flex-direction:column;}
 .sidebar{position:static;height:auto;width:auto;border-right:0;border-bottom:1px solid var(--line);padding:30px 26px;}
 .sidebar nav{display:none;}
 .side-foot{margin-top:14px;}
 .main{padding:34px 26px 70px;}
 h1{font-size:27px;}
 .metarow{grid-template-columns:1fr;}
 .goal{flex-direction:column;align-items:flex-start;gap:10px;}
}
</style>
</head>

<div id="gate">
  <div id="gate-card">
    <h2>Overseas-Chinese Growth Campaign</h2>
    <form id="gate-form" onsubmit="return gateSubmit(event)">
      <input id="gate-input" type="password" placeholder="password" autocomplete="off" autofocus>
      <button id="gate-btn" type="submit">Enter</button>
    </form>
    <div id="gate-err"></div>
  </div>
</div>
<div id="content" class="doc" hidden></div>

<script>
function b64ToBytes(b){const s=atob(b),a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
async function deriveKey(pw,salt,it){const e=new TextEncoder();const bk=await crypto.subtle.importKey("raw",e.encode(pw),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:it,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},false,["decrypt"]);}
async function decryptPayload(pw){const b=JSON.parse(document.getElementById('payload').textContent);const key=await deriveKey(pw,b64ToBytes(b.salt),b.iterations);const p=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64ToBytes(b.iv)},key,b64ToBytes(b.ciphertext));return new TextDecoder().decode(p);}
function reveal(html){const c=document.getElementById('content');c.innerHTML=html;c.hidden=false;document.getElementById('gate').style.display='none';document.body.classList.remove('locked');initDoc();}
async function gateSubmit(e){e.preventDefault();const inp=document.getElementById('gate-input'),err=document.getElementById('gate-err');err.textContent='';try{const h=await decryptPayload(inp.value);reveal(h);try{localStorage.setItem('oc_campaign_pw',inp.value);}catch(_){}}catch(ex){err.textContent='wrong password';inp.value='';inp.focus();}return false;}
function initDoc(){
  const links=[...document.querySelectorAll('.sidebar nav a')];
  const map={};links.forEach(a=>{const id=a.getAttribute('href').slice(1);map[id]=a;});
  const obs=new IntersectionObserver((ents)=>{
    ents.forEach(en=>{if(en.isIntersecting){links.forEach(l=>l.classList.remove('active'));if(map[en.target.id])map[en.target.id].classList.add('active');}});
  },{rootMargin:"-15% 0px -75% 0px",threshold:0});
  document.querySelectorAll('main section').forEach(s=>obs.observe(s));
}
(async()=>{try{const c=localStorage.getItem('oc_campaign_pw');if(c)reveal(await decryptPayload(c));}catch(_){try{localStorage.removeItem('oc_campaign_pw');}catch(_){}}})();
</script>
